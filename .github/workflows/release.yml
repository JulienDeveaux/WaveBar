name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: |
          swift build -c release

      - name: Create app bundle
        run: |
          APP="WaveBar.app"
          mkdir -p "$APP/Contents/MacOS"
          mkdir -p "$APP/Contents/Resources"
          cp .build/release/WaveBar "$APP/Contents/MacOS/"
          chmod +x "$APP/Contents/MacOS/WaveBar"
          cp Resources/Info.plist "$APP/Contents/"
          cp Resources/AppIcon.icns "$APP/Contents/Resources/"
          codesign --force --sign - --entitlements Resources/Entitlements.plist "$APP"

      - name: Zip app
        run: ditto -c -k --sequesterRsrc --keepParent WaveBar.app WaveBar.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: WaveBar.zip
          generate_release_notes: true
