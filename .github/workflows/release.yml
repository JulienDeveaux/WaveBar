name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" Resources/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $VERSION" Resources/Info.plist

      - name: Build
        run: |
          swift build -c release

      - name: Create app bundle
        run: |
          APP="WaveBar.app"
          mkdir -p "$APP/Contents/MacOS"
          mkdir -p "$APP/Contents/Resources"
          cp .build/release/WaveBar "$APP/Contents/MacOS/"
          chmod +x "$APP/Contents/MacOS/WaveBar"
          cp Resources/Info.plist "$APP/Contents/"
          cp Resources/AppIcon.icns "$APP/Contents/Resources/"
          codesign --force --sign - --entitlements Resources/Entitlements.plist "$APP"

      - name: Create DMG
        run: |
          mkdir -p dmg_contents
          cp -R WaveBar.app dmg_contents/
          ln -s /Applications dmg_contents/Applications
          hdiutil create -volname "WaveBar" -srcfolder dmg_contents -ov -format UDZO WaveBar.dmg

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: WaveBar.dmg
          generate_release_notes: true
