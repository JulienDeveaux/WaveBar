  </g>
  <g filter="url(#bloom-mid)" fill="#00e5ff" opacity="0.4">
    <rect x="72" y="296" width="32" height="80" rx="8"/>
    <rect x="120" y="236" width="32" height="140" rx="8"/>
    <rect x="168" y="176" width="32" height="200" rx="8"/>
